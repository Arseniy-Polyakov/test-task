<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/css_templates/style_start_template.css">
  <title>Персональный ассистент по финансовым курсам</title>
</head>

<body>
  <section class="msger">
    <header class="msger-header">
      <div class="msger-header-title">
        <i class="fas fa-comment-alt"></i> Персональный ассистент по финансовым курсам
      </div>
      <div class="msger-header-options">
        <span><i class="fas fa-cog"></i></span>
      </div>
    </header>

    <main class="msger-chat">
      <div class="msg left-msg">
        <div class="msg-img" style="background-image: url(https://image.flaticon.com/icons/svg/327/327779.svg)"></div>

        <div class="msg-bubble">
          <div class="msg-info">
            <div class="msg-info-name">Ассистент</div>
            <div class="msg-info-time"></div>
          </div>

          <div class="msg-text">
            Здравствуйте, меня зовут Виктор, я электронный помощник по курсам компании Финам.
            Пожалуйста, введите свой ID, для того чтобы продолжить общение
          </div>
        </div>
      </div>
      </div>
    </main>

    <form class="msger-inputarea" action="/getting_user_id" method="post">
      <div class="range-wrapper">
        <div class="value" id="value">15</div>
        <input type="range" min="1" max="30" value="15" id="range" name="user_id" required>
        <script>
          const range = document.getElementById('range');
          const value = document.getElementById('value');

          function update() {
            const min = +range.min;
            const max = +range.max;
            const val = +range.value;

            value.textContent = val;

            const percent = (val - min) / (max - min);
            const offset = percent * range.offsetWidth;

            value.style.left = offset + 'px';
          }

          range.addEventListener('input', update);
          update();
        </script>
      </div>
      <button type="submit" class="btnsend">Отправить</button>
    </form>
  </section>
</body>

</html>
